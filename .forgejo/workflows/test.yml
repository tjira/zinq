name: Test

on:
  push:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  test:
    name: ${{matrix.os}} / ${{matrix.mode_name}}
    runs-on: ${{matrix.os}}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: codeberg-medium
            mode_name: ReleaseFast
            build_flags: "--release=fast"
          - os: codeberg-medium
            mode_name: ReleaseSafe
            build_flags: "--release=safe"
          - os: codeberg-medium
            mode_name: ReleaseSmall
            build_flags: "--release=small"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Zig
        uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run Tests in ${{matrix.mode_name}} Mode
        run: zig build ${{matrix.build_flags}} test
