name: Documentation

on:
  push:
    branches:
      - 'master'

permissions:
  id-token: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install Build Tools
        run: pip install mkdocs

      - name: Cache Compiled Libraries
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: external-x86_64-linux-musl
          key: libs-x86_64-linux-musl-${{hashFiles('script/library.pl')}}

      - name: Compile Libraries
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: ./script/library.pl --target x86_64-linux

      - name: Compile Code Documentation
        run: zig build docs

      - name: Build MkDocs Site
        run: mkdocs build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      url: 'https://tjira.github.io/zinq'
      name: docs

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
