name: Test

on:
  push:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  test:
    name: ${{matrix.os}} / ${{matrix.mode_name}}
    runs-on: ${{matrix.os}}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            mode_name: Debug
            build_flags: ""
          - os: ubuntu-latest
            mode_name: ReleaseFast
            build_flags: "--release=fast"
          - os: ubuntu-latest
            mode_name: ReleaseSafe
            build_flags: "--release=safe"
          - os: ubuntu-latest
            mode_name: ReleaseSmall
            build_flags: "--release=small"

    steps:
      - uses: actions/checkout@v7

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install Boost
        run: sudo apt update && sudo apt install libboost-all-dev

      - name: Compile Libraries
        run: ./script/library.pl --target x86_64-linux --generic

      - name: Run Tests in ${{matrix.mode_name}} Mode
        run: zig build ${{matrix.build_flags}} test
