name: Test

on:
  push:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  test:
    name: ${{matrix.os}} / ${{matrix.mode_name}}
    runs-on: ${{matrix.os}}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            mode_name: Debug
            build_flags: ""
          - os: ubuntu-latest
            mode_name: ReleaseFast
            build_flags: "--release=fast"
          - os: ubuntu-latest
            mode_name: ReleaseSafe
            build_flags: "--release=safe"
          - os: ubuntu-latest
            mode_name: ReleaseSmall
            build_flags: "--release=small"

    steps:
      - uses: actions/checkout@v7

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Compiled Libraries
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: external-x86_64-linux
          key: libs-x86_64-linux-${{hashFiles('script/library.pl')}}

      - name: Install Dependencies
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: sudo apt-get install libarchive-tools

      - name: Install Boost
        id: install-boost
        if: steps.cache-libs.outputs.cache-hit != 'true'
        uses: MarkusJx/install-boost@v2
        with:
          boost_version: 1.83.0
          platform_version: 22.04

      - name: Compile Libraries
        if: steps.cache-libs.outputs.cache-hit != 'true'
        env:
          BOOST_ROOT: ${{steps.install-boost.outputs.BOOST_ROOT}}
        run: ./script/library.pl --target x86_64-linux --generic

      - name: Run Tests in ${{matrix.mode_name}} Mode
        run: zig build ${{matrix.build_flags}} -Dtarget=native-native-musl test
