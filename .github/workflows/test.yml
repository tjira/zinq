name: Test

on:
  push:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{matrix.python-version}}

      - name: Test the Pip Installer
        run: pip install -e .

      - name: Test the Program
        run: pytest
