name: Release

on:
  push:
    tags:
      - 'v**'

permissions:
  contents: write

jobs:
  release:
    name: ${{matrix.target}}-${{matrix.abi}}
    runs-on: ${{matrix.os}}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            abi: musl
          - os: ubuntu-latest
            target: x86_64-linux
            abi: gnu
          - os: ubuntu-latest
            target: aarch64-linux
            abi: musl
          - os: ubuntu-latest
            target: aarch64-linux
            abi: gnu
          - os: ubuntu-latest
            target: x86_64-macos
            abi: none
          - os: ubuntu-latest
            target: aarch64-macos
            abi: none
          - os: ubuntu-latest
            target: x86_64-windows
            abi: gnu
          - os: ubuntu-latest
            target: aarch64-windows
            abi: gnu

    steps:
      - uses: actions/checkout@v7

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Compiled Libraries
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: external-${{matrix.target}}
          key: libs-${{matrix.target}}-${{hashFiles('script/library.pl')}}

      - name: Install Dependencies
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: sudo apt-get install libarchive-tools

      - name: Install Boost
        id: install-boost
        if: steps.cache-libs.outputs.cache-hit != 'true'
        uses: MarkusJx/install-boost@v2
        with:
          boost_version: 1.83.0
          platform_version: 22.04

      - name: Compile Libraries
        if: steps.cache-libs.outputs.cache-hit != 'true'
        env:
          BOOST_ROOT: ${{steps.install-boost.outputs.BOOST_ROOT}}
        run: ./script/library.pl --target ${{matrix.target}} --generic

      - name: Compile Zinq
        run: zig build --release=safe -Dcpu=baseline -Dtarget=${{matrix.target}}-${{matrix.abi}}

      - name: Move Binary
        run: |
          shopt -s nullglob && mkdir -p bin && cd zig-out && for FOLDER in *64*linux*;   do mv $FOLDER/zinq     ../bin/zinq-$FOLDER;     done && cd -
          shopt -s nullglob && mkdir -p bin && cd zig-out && for FOLDER in *64*macos*;   do mv $FOLDER/zinq     ../bin/zinq-$FOLDER;     done && cd -
          shopt -s nullglob && mkdir -p bin && cd zig-out && for FOLDER in *64*windows*; do mv $FOLDER/zinq.exe ../bin/zinq-$FOLDER.exe; done && cd -

      - name: Release Zinq
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{secrets.GITHUB_TOKEN}}
          file_glob: true
          file: bin/zinq*
          tag: ${{github.ref}}
