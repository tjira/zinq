name: Release

on:
  push:
    tags:
      - 'v**'

permissions:
  contents: write

jobs:
  release:
    name: ${{matrix.os}} / ${{matrix.target}}
    runs-on: ${{matrix.os}}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: ubuntu-latest
            target: aarch64-linux

    steps:
      - uses: actions/checkout@v7

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Compile Libraries
        run: ./script/library.pl --target ${{matrix.target}}

      - name: Compile Zinq
        run: zig build --release=fast -Dtarget=${{matrix.target}}-musl

      - name: Move Binary
        run: mkdir -p bin && cd zig-out && for FOLDER in *64*linux*; do mv $FOLDER/zinq ../bin/zinq-$FOLDER; done && cd -

      - name: Release Zinq
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{secrets.GITHUB_TOKEN}}
          file_glob: true
          file: bin/zinq*
          tag: ${{github.ref}}
