name: Library

on:
  push:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  test:
    name: ${{matrix.os}} / ${{matrix.target}}-${{matrix.suffix}}
    runs-on: ${{matrix.os}}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            build_flags: ""
            suffix: "gnu"
          - os: ubuntu-latest
            target: x86_64-linux
            build_flags: "--static"
            suffix: "musl"
          - os: ubuntu-latest
            target: aarch64-linux
            build_flags: ""
            suffix: "gnu"
          - os: ubuntu-latest
            target: aarch64-linux
            build_flags: "--static"
            suffix: "musl"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Compile Libraries
        run: ./script/library.pl --target ${{matrix.target}} ${{matrix.build_flags}}

      - name: Compress the Library Directory
        run: tar -cJf external-${{matrix.target}}-${{matrix.suffix}}.tar.xz external-${{matrix.target}}-${{matrix.suffix}}
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          path: external-${{matrix.target}}-${{matrix.suffix}}
