site_name: Zinq
site_url: https://tjira.github.io/zinq
repo_url: https://github.com/tjira/zinq

theme:
  name: material
  favicon: favicon.ico

extra:
  generator: false

extra_javascript:
  - js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

nav:
  - Home: index.md
  - Dual Numbers: dual_numbers.md
  - Ehrenfest Dynamics: ehrenfest_dynamics.md
  - Fewest Switches Surface Hopping: fewest_switches_surface_hopping.md
  - Landau–Zener Surface Hopping: landau_zener_surface_hopping.md
  - Split-Operator Method: split_operator_method.md
  - Hartree–Fock Method: hartree_fock.md
  - Møller–Plesset Perturbation Theory: moller_plesset.md
  - Configuration–Interaction: configuration_interaction.md
